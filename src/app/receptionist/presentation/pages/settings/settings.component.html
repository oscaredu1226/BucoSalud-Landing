<section class="min-h-[calc(100vh-80px)] py-8 md:py-10">
  <div class="container mx-auto px-4 sm:px-6">
    <!-- Header -->
    <div class="mb-8 flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl md:text-3xl font-semibold text-foreground">Configuración</h1>
        <p class="text-sm text-muted-foreground mt-1">
          Preferencias generales del recepcionista (solo maquetación).
        </p>
      </div>

      <button
        type="button"
        (click)="save()"
        [disabled]="isSaving"
        class="inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold
               bg-primary text-primary-foreground hover:bg-[hsl(var(--primary-hover))] transition-colors
               disabled:opacity-60"
      >
        @if (isSaving) { <span>Guardando...</span> } @else { <span>Guardar</span> }
      </button>
    </div>

    <div class="grid lg:grid-cols-3 gap-6">
      <!-- Left -->
      <div class="lg:col-span-2 space-y-6">
        <!-- Clinic -->
        <div class="bg-card rounded-2xl border border-border shadow-sm">
          <div class="p-6 border-b border-border">
            <h2 class="font-semibold text-foreground">Clínica</h2>
            <p class="text-sm text-muted-foreground mt-1">Nombre y datos básicos.</p>
          </div>

          <div class="p-6 space-y-4">
            <div>
              <label class="block text-sm font-medium text-foreground mb-2">Nombre</label>
              <input
                type="text"
                [(ngModel)]="clinicName"
                class="h-11 w-full rounded-xl border border-border/70 bg-background px-4 text-sm
                       focus:outline-none focus:ring-2 focus:ring-primary/30"
              />
            </div>

            <div class="rounded-xl border border-border/70 bg-background/40 p-4">
              <p class="text-sm text-foreground font-medium">Estado</p>
              <p class="text-xs text-muted-foreground mt-1">
                Conectaremos esto a tu sesión y Supabase luego.
              </p>
            </div>
          </div>
        </div>

        <!-- Notifications -->
        <div class="bg-card rounded-2xl border border-border shadow-sm">
          <div class="p-6 border-b border-border">
            <h2 class="font-semibold text-foreground">Notificaciones</h2>
            <p class="text-sm text-muted-foreground mt-1">Preferencias de avisos.</p>
          </div>

          <div class="p-6 space-y-4">
            <label class="flex items-center justify-between gap-3 rounded-xl border border-border/70 bg-background/40 p-4">
              <div>
                <p class="font-medium text-foreground text-sm">Email</p>
                <p class="text-xs text-muted-foreground">Confirmaciones y recordatorios.</p>
              </div>
              <input type="checkbox" [(ngModel)]="notificationsEmail" class="h-5 w-5 accent-[hsl(var(--primary))]" />
            </label>

            <label class="flex items-center justify-between gap-3 rounded-xl border border-border/70 bg-background/40 p-4">
              <div>
                <p class="font-medium text-foreground text-sm">WhatsApp</p>
                <p class="text-xs text-muted-foreground">Avisos rápidos a pacientes.</p>
              </div>
              <input type="checkbox" [(ngModel)]="notificationsWhatsapp" class="h-5 w-5 accent-[hsl(var(--primary))]" />
            </label>
          </div>
        </div>
      </div>

      <!-- Right -->
      <div class="space-y-6">
        <!-- Theme -->
        <div class="bg-card rounded-2xl border border-border shadow-sm">
          <div class="p-6 border-b border-border">
            <h2 class="font-semibold text-foreground">Apariencia</h2>
            <p class="text-sm text-muted-foreground mt-1">Tema del panel.</p>
          </div>

          <div class="p-6 space-y-3">
            <button
              type="button"
              (click)="theme='system'"
              class="w-full text-left rounded-xl border border-border/70 p-4 transition-colors"
              [class.bg-secondary]="theme==='system'"
            >
              <p class="font-medium text-foreground text-sm">Sistema</p>
              <p class="text-xs text-muted-foreground">Usa el tema del dispositivo.</p>
            </button>

            <button
              type="button"
              (click)="theme='light'"
              class="w-full text-left rounded-xl border border-border/70 p-4 transition-colors"
              [class.bg-secondary]="theme==='light'"
            >
              <p class="font-medium text-foreground text-sm">Claro</p>
              <p class="text-xs text-muted-foreground">Fondo claro.</p>
            </button>

            <button
              type="button"
              (click)="theme='dark'"
              class="w-full text-left rounded-xl border border-border/70 p-4 transition-colors"
              [class.bg-secondary]="theme==='dark'"
            >
              <p class="font-medium text-foreground text-sm">Oscuro</p>
              <p class="text-xs text-muted-foreground">Fondo oscuro.</p>
            </button>
          </div>
        </div>

        <!-- Danger zone -->
        <div class="bg-card rounded-2xl border border-border shadow-sm">
          <div class="p-6 border-b border-border">
            <h2 class="font-semibold text-foreground">Zona peligrosa</h2>
            <p class="text-sm text-muted-foreground mt-1">Acciones sensibles (UI).</p>
          </div>

          <div class="p-6">
            <button
              type="button"
              class="w-full rounded-xl px-4 py-2 text-sm font-semibold
                     border border-destructive/40 text-destructive hover:bg-destructive/10 transition-colors"
            >
              Cerrar sesión en todos los dispositivos
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
