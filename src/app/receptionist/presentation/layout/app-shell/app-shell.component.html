<div class="h-screen overflow-hidden bg-background text-foreground">

  <!-- ================= MOBILE TOP BAR ================= -->
  <header class="lg:hidden border-b border-border bg-background/80 backdrop-blur">
    <div class="mx-auto flex h-14 max-w-screen-2xl items-center justify-between px-4">

      <button
        type="button"
        class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-border hover:bg-muted transition"
        (click)="toggleMobileMenu()"
        aria-label="Abrir menú"
      >
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 6h16"></path>
          <path d="M4 12h16"></path>
          <path d="M4 18h16"></path>
        </svg>
      </button>

      <div class="flex items-center gap-2">
        <div class="h-8 w-8 rounded-lg bg-primary"></div>
        <div class="leading-tight">
          <p class="text-sm font-semibold">Recepción</p>
          <p class="text-xs text-muted-foreground">BucoPerú</p>
        </div>
      </div>

      <div class="h-10 w-10"></div>
    </div>
  </header>

  <!-- ================= LAYOUT ================= -->
  <div class="mx-auto flex h-[calc(100vh-56px)] lg:h-screen max-w-screen-2xl">

    <!-- ================= SIDEBAR DESKTOP ================= -->
    <aside class="hidden lg:flex w-[280px] border-r border-border bg-background">
      <div class="flex h-full w-full flex-col">

        <!-- Header -->
        <div class="flex items-center gap-3 px-5 py-5 border-b border-border">
          <div class="h-10 w-10 rounded-xl bg-primary"></div>
          <div class="leading-tight">
            <p class="font-heading text-base font-semibold">Recepción</p>
            <p class="text-xs text-muted-foreground">BucoPerú</p>
          </div>
        </div>

        <!-- Menu -->
        <nav class="px-3 py-5 flex-1 overflow-auto">
          <p class="px-3 pb-2 text-xs font-semibold text-muted-foreground uppercase tracking-wider">
            Menú
          </p>

          @for (item of nav; track item.path) {
            <a
              [routerLink]="item.path"
              routerLinkActive="is-active"
              [routerLinkActiveOptions]="{ exact: true }"
              #rla="routerLinkActive"
              class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm"
              [ngClass]="{
                'bg-primary text-primary-foreground': rla.isActive,
                'text-muted-foreground': !rla.isActive
              }"
            >
              <span
                class="inline-flex h-9 w-9 items-center justify-center rounded-lg
                       bg-secondary-foreground/5 border border-secondary-foreground/10"
              >
                <!-- icon dot -->
                <span
                  class="h-2 w-2 rounded-full"
                  [ngClass]="{
                    'bg-primary-foreground': rla.isActive,
                    'bg-primary': !rla.isActive
                  }"
                ></span>
              </span>

              <span class="font-medium">{{ item.label }}</span>
            </a>
          }
        </nav>

        <!-- ================= LOGOUT ================= -->
        <div class="p-4 border-t border-border bg-background">
          <button
            type="button"
            (click)="logout()"
            class="inline-flex w-full items-center justify-center gap-3 rounded-2xl
                   border border-border bg-background px-4 py-3
                   text-sm font-semibold text-foreground hover:bg-muted transition"
            aria-label="Cerrar sesión"
          >
            <span
              class="inline-flex h-10 w-10 items-center justify-center rounded-xl
                     bg-secondary-foreground/5 border border-secondary-foreground/10"
            >
              <!-- logout icon -->
              <svg class="h-5 w-5 text-muted-foreground" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <path d="M16 17l5-5-5-5"></path>
                <path d="M21 12H9"></path>
              </svg>
            </span>
            Cerrar sesión
          </button>
        </div>

      </div>
    </aside>

    <!-- ================= MOBILE DRAWER ================= -->
    <div class="fixed inset-0 z-50 lg:hidden" [class.pointer-events-none]="!isMobileMenuOpen">
      <div
        class="absolute inset-0 bg-black/40 transition-opacity"
        [class.opacity-0]="!isMobileMenuOpen"
        [class.opacity-100]="isMobileMenuOpen"
        (click)="closeMobileMenu()"
      ></div>

      <aside
        class="absolute left-0 top-0 h-full w-[280px] bg-background border-r border-border transition-transform"
        [class.-translate-x-full]="!isMobileMenuOpen"
        [class.translate-x-0]="isMobileMenuOpen"
      >
        <div class="flex items-center justify-between px-4 py-4 border-b border-border">
          <div class="flex items-center gap-2">
            <div class="h-9 w-9 rounded-xl bg-primary"></div>
            <div class="leading-tight">
              <p class="text-sm font-semibold">Recepción</p>
              <p class="text-xs text-muted-foreground">BucoPerú</p>
            </div>
          </div>

          <button
            type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded-lg border border-border hover:bg-muted transition"
            (click)="closeMobileMenu()"
            aria-label="Cerrar menú"
          >
            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 6 6 18"></path>
              <path d="M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <nav class="px-3 py-3">
          @for (item of nav; track item.path) {
            <a
              [routerLink]="item.path"
              routerLinkActive="bg-primary text-primary-foreground"
              [routerLinkActiveOptions]="{ exact: true }"
              class="flex items-center gap-3 rounded-xl px-3 py-2.5 text-sm text-muted-foreground hover:bg-secondary-foreground/5 hover:text-foreground transition"
              (click)="closeMobileMenu()"
            >
              <span class="inline-flex h-9 w-9 items-center justify-center rounded-lg bg-secondary-foreground/5 border border-secondary-foreground/10">
                <span class="h-2 w-2 rounded-full bg-primary"></span>
              </span>
              <span class="font-medium">{{ item.label }}</span>
            </a>
          }
        </nav>
      </aside>
    </div>

    <!-- ================= MAIN ================= -->
    <main class="flex-1 flex flex-col">

      <div class="hidden lg:block border-b border-border bg-background/80 backdrop-blur">
        <div class="mx-auto flex h-16 items-center px-6">
          <div>
            <p class="text-sm text-muted-foreground">Recepcionista</p>
            <p class="font-heading text-lg font-semibold">Panel</p>
          </div>
        </div>
      </div>

      <div class="flex-1 overflow-y-auto px-4 py-6 sm:px-6 lg:px-8">
        <router-outlet></router-outlet>
      </div>

    </main>
  </div>
</div>
