<section class="relative min-h-screen flex items-center overflow-hidden">
  <!-- Background Image with Overlay -->
  <div class="absolute inset-0">
    <!-- Background Image -->
    <img
      ngSrc="/assets/doctor-consultation2.png"
      alt="Especialista en rehabilitación buco maxilofacial atendiendo a paciente oncológico"
      class="w-full h-full object-cover"
      height="1080"
      width="1920"
      priority
    />

    <!-- Overlay -->
    <div
      class="absolute inset-0 bg-gradient-to-br from-secondary/80 via-secondary/60 to-primary/40"
    ></div>
  </div>

  <!-- Content -->
  <div
    class="container relative z-10 mx-auto px-4 sm:px-6 pt-24 pb-16 md:pt-32 md:pb-24"
  >
    <div class="grid lg:grid-cols-2 gap-12 lg:gap-16 items-center">
      <!-- LEFT: Content -->
      <div class="max-w-3xl order-2 lg:order-1">

        <!-- H1: Main SEO Heading -->
        <h1
          class="font-heading text-4xl sm:text-5xl md:text-6xl lg:text-7xl font-semibold text-background leading-tight mb-6 animate-fade-in"
        >
          Rehabilitación BucoMaxilofacial Oncológica en Perú
        </h1>

        <!-- Subheadline / Claim -->
        <p
          class="text-lg sm:text-xl text-background/80 leading-relaxed max-w-2xl mb-10 animate-fade-in"
        >
          Rehabilitamos funciones. Restauramos vidas.
          <br class="hidden sm:block" />
          Atención especializada y humana para pacientes oncológicos con necesidades bucomaxilofaciales.
        </p>

        <!-- CTAs -->
        <div class="flex flex-col sm:flex-row gap-4 animate-fade-in">
          <button
            type="button"
            (click)="scrollToSection('contacto')"
            class="group inline-flex items-center justify-center gap-2 rounded-lg px-6 py-3 text-base font-semibold
                   bg-primary text-primary-foreground shadow-md hover:bg-[hsl(var(--primary-hover))]
                   transition-colors"
          >
            Agenda tu Consulta
            <svg
              class="w-5 h-5 transition-transform group-hover:translate-x-1"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M5 12h14"></path>
              <path d="m13 5 7 7-7 7"></path>
            </svg>
          </button>

          <button
            type="button"
            (click)="scrollToSection('proceso')"
            class="inline-flex items-center justify-center rounded-lg px-6 py-3 text-base font-semibold
                   border border-background/30 text-background hover:bg-background/10 transition-colors"
          >
            Conoce Nuestro Proceso
          </button>
        </div>

        <!-- Stats -->
        <div class="mt-12 pt-8 border-t border-background/10 animate-fade-in">
          <div class="grid grid-cols-3 gap-8">
            <div>
              <div class="text-3xl sm:text-4xl font-heading font-semibold text-background">15+</div>
              <div class="text-sm text-background/60">Años de experiencia</div>
            </div>
            <div>
              <div class="text-3xl sm:text-4xl font-heading font-semibold text-background">
                2,000+
              </div>
              <div class="text-sm text-background/60">Pacientes atendidos</div>
            </div>
            <div>
              <div class="text-3xl sm:text-4xl font-heading font-semibold text-background">98%</div>
              <div class="text-sm text-background/60">Nivel de satisfacción</div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
