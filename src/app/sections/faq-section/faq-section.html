<section id="faq" class="py-20 md:py-28 bg-[hsl(var(--primary-soft))]">
  <div class="container mx-auto px-4 sm:px-6">
    <!-- Section Header -->
    <div class="text-center max-w-2xl mx-auto mb-16">
      <span class="text-primary font-medium text-sm uppercase tracking-wider">
        Preguntas Frecuentes
      </span>

      <h2 class="font-heading text-3xl sm:text-4xl md:text-5xl font-semibold text-foreground mt-3 mb-5">
        Preguntas Comunes
      </h2>

      <p class="text-muted-foreground text-lg leading-relaxed">
        Entendemos que tienes preguntas. Aquí están las respuestas a lo que los pacientes preguntan con más frecuencia.
      </p>
    </div>

    <!-- FAQ Accordion -->
    <div class="max-w-3xl mx-auto">
      <div class="bg-card rounded-xl shadow-card border border-border p-6 md:p-8">
        <div class="w-full">
          @for (faq of faqs; track trackByIndex; let i = $index) {
            <div class="border-b border-border last:border-b-0">
              <!-- Trigger -->
              <button
                type="button"
                class="w-full py-4 flex items-center justify-between gap-4 text-left font-heading text-lg hover:text-primary transition-colors"
                (click)="toggle(i)"
                [attr.aria-expanded]="openIndex === i"
              >
                <span>{{ faq.question }}</span>

                <!-- chevron -->
                <svg
                  class="h-5 w-5 text-foreground/60 transition-transform"
                  [class.rotate-180]="openIndex === i"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="m6 9 6 6 6-6"></path>
                </svg>
              </button>

              <!-- Content -->
              <div
                class="grid transition-[grid-template-rows] duration-200 ease-out"
                [style.gridTemplateRows]="openIndex === i ? '1fr' : '0fr'"
              >
                <div class="overflow-hidden">
                  <div class="pb-4 text-muted-foreground leading-relaxed">
                    {{ faq.answer }}
                  </div>
                </div>
              </div>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
