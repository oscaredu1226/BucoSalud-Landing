<section id="testimonios" class="py-20 md:py-28 bg-background">
  <div class="container mx-auto px-4 sm:px-6">
    <!-- Section Header -->
    <div class="text-center max-w-2xl mx-auto mb-16">
      <span class="text-primary font-medium text-sm uppercase tracking-wider"
      >Testimonios</span
      >
      <h2
        class="font-heading text-3xl sm:text-4xl md:text-5xl font-semibold text-foreground mt-3 mb-5"
      >
        Historias de Confianza Renovada
      </h2>
      <p class="text-muted-foreground text-lg leading-relaxed">
        Escucha de pacientes que han experimentado la diferencia Renova.
      </p>
    </div>

    <!-- Testimonials Layout with Image -->
    <div class="grid lg:grid-cols-2 gap-8 lg:gap-12 items-center">
      <!-- Feature Image -->
      <div
        class="relative rounded-2xl overflow-hidden shadow-xl order-2 lg:order-1"
      >
        <img
          [src]="patientImage"
          alt="Paciente feliz con su nueva sonrisa"
          class="w-full h-80 md:h-[500px] object-cover object-center"
        />
        <div
          class="absolute inset-0 bg-gradient-to-t from-secondary/60 via-transparent to-transparent"
        ></div>
        <div class="absolute bottom-0 left-0 right-0 p-6 md:p-8">
          <div
            class="inline-flex items-center gap-2 px-4 py-2 bg-white/95 backdrop-blur-sm rounded-full shadow-lg"
          >
            <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
            <span class="text-foreground font-medium text-sm"
            >+2,000 Sonrisas Restauradas</span
            >
          </div>
        </div>
      </div>

      <!-- Testimonials Grid -->
      <div class="space-y-6 order-1 lg:order-2">
        @for (testimonial of testimonials; track $index) {
          <div
            class="bg-card rounded-xl p-6 md:p-8 shadow-card border border-border relative group hover:shadow-lg transition-all duration-200"
          >
            <!-- Quote Icon -->
            <div
              class="absolute -top-3 left-6 w-8 h-8 rounded-lg bg-primary flex items-center justify-center shadow-md"
            >
              <!-- Quote (SVG) -->
              <svg
                class="w-4 h-4 text-primary-foreground"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path
                  d="M3 21c3 0 7-1 7-8V7H5c-1 0-2 1-2 2v4c0 1 1 2 2 2h3"
                ></path>
                <path
                  d="M14 21c3 0 7-1 7-8V7h-5c-1 0-2 1-2 2v4c0 1 1 2 2 2h3"
                ></path>
              </svg>
            </div>

            <!-- Quote -->
            <blockquote
              class="text-foreground leading-relaxed mb-4 pt-3 italic text-sm md:text-base"
            >
              "{{ testimonial.quote }}"
            </blockquote>

            <!-- Attribution -->
            <div class="border-t border-border pt-4 flex items-center gap-3">
              <div
                class="w-10 h-10 rounded-full bg-gradient-to-br from-secondary to-primary flex items-center justify-center"
              >
                <span class="text-white font-semibold text-xs">
                  {{ testimonial.initials }}
                </span>
              </div>
              <div>
                <p class="font-heading font-semibold text-foreground text-sm">
                  {{ testimonial.name }}
                </p>
                <p class="text-xs text-muted-foreground">
                  {{ testimonial.context }}
                </p>
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</section>
