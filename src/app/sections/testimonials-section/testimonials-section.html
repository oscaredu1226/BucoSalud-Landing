<section id="testimonios" class="py-20 md:py-28 bg-background">
  <div class="container mx-auto px-4 sm:px-6">
    <!-- Section Header -->
    <div class="text-center max-w-2xl mx-auto mb-16">
      <span class="text-primary font-medium text-sm uppercase tracking-wider">
        Testimonios
      </span>

      <h2 class="font-heading text-3xl sm:text-4xl md:text-5xl font-semibold text-foreground mt-3 mb-5">
        Historias de Confianza Renovada
      </h2>

      <p class="text-muted-foreground text-lg leading-relaxed">
        Escucha de pacientes que han experimentado la diferencia Renova.
      </p>
    </div>

    <!-- Testimonials Grid -->
    <div class="grid md:grid-cols-3 gap-6 lg:gap-8">
      @for (testimonial of testimonials; track trackByIndex; let i = $index) {
        <div
          class="bg-card rounded-xl p-8 shadow-card border border-border relative group hover:shadow-lg transition-all duration-200"
        >
          <!-- Quote Icon -->
          <div
            class="absolute -top-4 left-8 w-10 h-10 rounded-lg bg-primary flex items-center justify-center shadow-md"
          >
            <!-- Quote SVG -->
            <svg
              class="w-5 h-5 text-primary-foreground"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M3 21c3 0 7-1 7-8V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v8c0 4 1 8 7 8Z"></path>
              <path d="M14 21c3 0 7-1 7-8V5c0-1.1-.9-2-2-2h-3c-1.1 0-2 .9-2 2v8c0 4 1 8 7 8Z"></path>
            </svg>
          </div>

          <!-- Quote -->
          <blockquote class="text-foreground leading-relaxed mb-6 pt-4 italic">
            "{{ testimonial.quote }}"
          </blockquote>

          <!-- Attribution -->
          <div class="border-t border-border pt-4">
            <p class="font-heading font-semibold text-foreground">
              {{ testimonial.name }}
            </p>
            <p class="text-sm text-muted-foreground">
              {{ testimonial.context }}
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
